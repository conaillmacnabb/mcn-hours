<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="MCN Hours">
  <meta name="theme-color" content="#2d3530">
  <meta name="mobile-web-app-capable" content="yes">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link rel="manifest" href="manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <title>MCN Hours</title>
  <style>
    /* ── Reset & Variables ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --primary:    #c9a84c;
      --primary-dk: #b8923d;
      --header-bg:  #2d3530;
      --green:   #16a34a;
      --amber:   #d97706;
      --red:     #dc2626;
      --bg:      #f5f5f5;
      --surface: #ffffff;
      --border:  #e2e8f0;
      --text:    #1a1a1a;
      --muted:   #64748b;
      --radius:  12px;
      --shadow:  0 1px 3px rgba(0,0,0,.10), 0 1px 2px rgba(0,0,0,.06);
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bot: env(safe-area-inset-bottom, 0px);
    }

    html, body {
      height: 100%;
      font-family: 'Montserrat', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 16px;
      -webkit-tap-highlight-color: transparent;
    }

    /* ── Layout ── */
    #app { display: flex; flex-direction: column; min-height: 100%; }

    header {
      background: var(--header-bg);
      color: #fff;
      padding: calc(12px + var(--safe-top)) 16px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 8px rgba(0,0,0,.35);
    }
    .header-brand { display: flex; align-items: center; gap: 10px; }
    .header-logo  { height: 36px; width: auto; display: block; }
    header h1 { font-size: 1.05rem; font-weight: 800; letter-spacing: .5px; color: #fff; text-transform: uppercase; }
    header .view-toggle { display: flex; gap: 4px; }
    .view-btn {
      padding: 6px 14px;
      border: 1.5px solid rgba(255,255,255,.4);
      border-radius: 20px;
      background: transparent;
      color: rgba(255,255,255,.7);
      font-size: .8rem;
      font-weight: 600;
      cursor: pointer;
      transition: all .2s;
      font-family: inherit;
    }
    .view-btn.active { background: var(--primary); color: var(--header-bg); border-color: var(--primary); font-weight: 700; }

    main { flex: 1; padding: 16px 16px calc(16px + var(--safe-bot)); max-width: 640px; width: 100%; margin: 0 auto; }

    /* ── Cards & Sections ── */
    .card {
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      margin-bottom: 12px;
      overflow: hidden;
    }
    .card-header {
      padding: 14px 16px 10px;
      border-bottom: 1px solid var(--border);
      font-weight: 700;
      font-size: .9rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .5px;
    }

    /* ── Buttons ── */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 10px 18px;
      border: none;
      border-radius: 8px;
      font-size: .9rem;
      font-weight: 600;
      cursor: pointer;
      transition: filter .15s, transform .1s;
      min-height: 44px;
    }
    .btn:active { transform: scale(.97); }
    .btn-primary   { background: var(--primary);  color: #fff; }
    .btn-primary:hover { filter: brightness(1.1); }
    .btn-success   { background: var(--green); color: #fff; }
    .btn-success:hover { filter: brightness(1.1); }
    .btn-danger    { background: var(--red);   color: #fff; }
    .btn-danger:hover { filter: brightness(1.1); }
    .btn-outline   { background: transparent; border: 1.5px solid var(--border); color: var(--text); }
    .btn-outline:hover { background: var(--bg); }
    .btn-sm        { padding: 6px 12px; font-size: .8rem; min-height: 36px; }
    .btn-icon      { padding: 8px; min-height: 36px; min-width: 36px; border-radius: 8px; background: var(--bg); border: none; cursor: pointer; color: var(--muted); font-size: 1rem; }
    .btn-icon:hover { color: var(--text); }
    .btn:disabled  { opacity: .45; cursor: not-allowed; transform: none; }

    /* ── Forms ── */
    .field { margin-bottom: 14px; }
    .field label { display: block; font-size: .85rem; font-weight: 600; color: var(--muted); margin-bottom: 6px; }
    input, select, textarea {
      width: 100%;
      padding: 10px 12px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-size: 1rem;
      font-family: inherit;
      background: var(--surface);
      color: var(--text);
      transition: border-color .2s;
      min-height: 44px;
    }
    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(201,168,76,.15);
    }
    textarea { min-height: 80px; resize: vertical; }

    /* ── Staff View ── */
    #staff-selector {
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 16px;
      margin-bottom: 16px;
    }
    #staff-selector label { font-weight: 700; font-size: .9rem; display: block; margin-bottom: 8px; }

    .client-card {
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .client-card:last-child { border-bottom: none; }
    .client-info { flex: 1; min-width: 0; }
    .client-name { font-weight: 700; font-size: 1rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .client-meta { font-size: .8rem; color: var(--muted); margin-top: 2px; }
    .timer-display { font-size: 1rem; font-weight: 700; font-variant-numeric: tabular-nums; color: var(--primary); min-width: 70px; text-align: center; }
    .timer-btn { min-width: 80px; }

    .limit-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: .75rem;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 20px;
      margin-top: 4px;
    }
    .badge-amber { background: #fef3c7; color: #92400e; }
    .badge-red   { background: #fee2e2; color: #991b1b; }

    /* ── Recent Entries ── */
    .log-row {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: flex-start;
      gap: 10px;
    }
    .log-row:last-child { border-bottom: none; }
    .log-info { flex: 1; min-width: 0; }
    .log-client { font-weight: 700; font-size: .95rem; }
    .log-time   { font-size: .8rem; color: var(--muted); margin-top: 2px; }
    .log-hours  { font-weight: 700; font-size: .9rem; color: var(--primary); white-space: nowrap; }
    .log-open   { color: var(--amber); }
    .log-actions { display: flex; gap: 4px; margin-top: 4px; }

    /* ── Owner: PIN Gate ── */
    #pin-gate {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 24px;
      gap: 16px;
    }
    #pin-gate h2 { font-size: 1.4rem; }
    #pin-gate p  { color: var(--muted); text-align: center; }
    #pin-input   { max-width: 200px; text-align: center; font-size: 1.5rem; letter-spacing: .5em; }
    #pin-error   { color: var(--red); font-size: .85rem; min-height: 20px; }

    /* ── Owner: Tabs ── */
    .tab-bar {
      display: flex;
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      margin-bottom: 16px;
      overflow: hidden;
    }
    .tab-btn {
      flex: 1;
      padding: 12px 4px;
      border: none;
      background: transparent;
      font-size: .8rem;
      font-weight: 600;
      color: var(--muted);
      cursor: pointer;
      border-bottom: 3px solid transparent;
      transition: all .2s;
      min-height: 48px;
    }
    .tab-btn.active { color: var(--primary); border-bottom-color: var(--primary); }

    /* ── Dashboard ── */
    .client-progress {
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
    }
    .client-progress:last-child { border-bottom: none; }
    .progress-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 6px; }
    .progress-name   { font-weight: 700; }
    .progress-label  { font-size: .82rem; color: var(--muted); }
    .progress-bar    { height: 10px; background: var(--bg); border-radius: 5px; overflow: hidden; }
    .progress-fill   { height: 100%; border-radius: 5px; transition: width .4s ease; }
    .fill-green { background: var(--green); }
    .fill-amber { background: var(--amber); }
    .fill-red   { background: var(--red);   }
    .progress-footer { display: flex; justify-content: space-between; font-size: .78rem; color: var(--muted); margin-top: 4px; }

    /* ── Owner tables ── */
    .owner-list-item {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .owner-list-item:last-child { border-bottom: none; }
    .owner-list-item .item-info { flex: 1; min-width: 0; }
    .owner-list-item .item-name { font-weight: 700; }
    .owner-list-item .item-meta { font-size: .8rem; color: var(--muted); margin-top: 2px; }
    .owner-list-item .item-actions { display: flex; gap: 6px; }

    /* Logs table — scrollable on small screens */
    .log-table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: .85rem; }
    th { text-align: left; padding: 8px 10px; color: var(--muted); font-weight: 600; border-bottom: 2px solid var(--border); white-space: nowrap; }
    td { padding: 10px 10px; border-bottom: 1px solid var(--border); vertical-align: top; }
    tr:last-child td { border-bottom: none; }
    .td-actions { display: flex; gap: 4px; white-space: nowrap; }

    /* ── Filter bar ── */
    .filter-bar { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
    .filter-bar select { flex: 1; min-width: 120px; }

    /* ── Add form row ── */
    .add-row { padding: 14px 16px; border-top: 1px solid var(--border); display: flex; gap: 8px; flex-wrap: wrap; }
    .add-row input, .add-row select { flex: 1; min-width: 120px; }

    /* ── Modals ── */
    .modal-bg {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.5);
      z-index: 200;
      align-items: flex-end;
      justify-content: center;
    }
    .modal-bg.open { display: flex; }
    .modal {
      background: var(--surface);
      border-radius: var(--radius) var(--radius) 0 0;
      padding: 24px 20px calc(24px + var(--safe-bot));
      width: 100%;
      max-width: 560px;
      max-height: 90vh;
      overflow-y: auto;
      animation: slideUp .25s ease;
    }
    @media (min-width: 560px) {
      .modal-bg { align-items: center; }
      .modal { border-radius: var(--radius); max-height: 80vh; }
    }
    @keyframes slideUp { from { transform: translateY(40px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    .modal h2 { font-size: 1.1rem; margin-bottom: 18px; }
    .modal-footer { display: flex; gap: 10px; margin-top: 20px; }
    .modal-footer .btn { flex: 1; }

    /* ── Alerts ── */
    .alert {
      padding: 12px 14px;
      border-radius: 8px;
      font-size: .9rem;
      font-weight: 500;
      margin-bottom: 12px;
    }
    .alert-red   { background: #fee2e2; color: #991b1b; }
    .alert-amber { background: #fef3c7; color: #92400e; }

    /* ── Spinner ── */
    .spinner { text-align: center; padding: 32px; color: var(--muted); }
    .empty   { text-align: center; padding: 32px; color: var(--muted); font-size: .9rem; }

    /* ── Utility ── */
    [hidden] { display: none !important; }
    .text-right { text-align: right; }
    .flex-end { display: flex; justify-content: flex-end; }
    .mt8 { margin-top: 8px; }

    /* ── Toast notification ── */
    #toast-container {
      position: fixed; bottom: calc(20px + var(--safe-bot)); left: 50%;
      transform: translateX(-50%); z-index: 400; pointer-events: none;
      display: flex; flex-direction: column; align-items: center; gap: 8px;
    }
    .toast {
      padding: 11px 20px; border-radius: 8px; font-size: .88rem; font-weight: 500;
      box-shadow: 0 4px 16px rgba(0,0,0,.25); white-space: nowrap;
      animation: fadeInUp .2s ease; pointer-events: none;
    }
    .toast-error { background: #1a1a1a; color: #fff; }
    .toast-info  { background: var(--header-bg); color: #fff; }
    @keyframes fadeInUp { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }

    /* ── Refresh button ── */
    .selector-label-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
    .selector-label-row label { font-weight: 700; font-size: .9rem; margin-bottom: 0; }
    .btn-refresh {
      background: none; border: none; color: var(--muted); font-size: 1.1rem;
      cursor: pointer; padding: 2px 6px; border-radius: 4px;
      transition: color .2s, transform .2s; line-height: 1;
    }
    .btn-refresh:hover { color: var(--primary); }
    .btn-refresh.spinning { animation: spin .7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .load-error { color: var(--red); font-size: .85rem; margin-top: 8px; }

    /* ── Task input in client card ── */
    .task-label { display: block; font-size: .75rem; font-weight: 600; color: var(--muted); margin: 8px 0 4px; text-transform: uppercase; letter-spacing: .4px; }
    .task-input {
      width: 100%; padding: 7px 10px; font-size: .85rem; min-height: 36px;
      border: 1.5px solid var(--border); border-radius: 6px;
      font-family: inherit; background: var(--bg); color: var(--text);
      transition: border-color .2s;
    }
    .task-input:focus {
      outline: none; border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(201,168,76,.15); background: var(--surface);
    }
    .client-task-running { font-size: .82rem; color: var(--primary); font-weight: 600; margin-top: 5px; }
    .log-task { font-size: .82rem; color: var(--text); font-weight: 600; margin-top: 2px; }

    /* ── Tier pill ── */
    .tier { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: .72rem; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; }
    .tier-bronze { background: #fde68a; color: #78350f; }
    .tier-silver { background: #e2e8f0; color: #475569; }
    .tier-gold   { background: #fef9c3; color: #854d0e; }
  </style>
</head>

    <div class="view-toggle">
      <button class="view-btn active" id="btn-staff-view" onclick="switchView('staff')">Staff</button>
      <button class="view-btn" id="btn-owner-view" onclick="switchView('owner')">Owner</button>
    </div>
  </header>

  <main>
    <!-- ══════════════ STAFF VIEW ══════════════ -->
    <div id="staff-view">
      <div id="staff-selector" class="card">
        <div class="selector-label-row">
          <label for="staff-select">Who are you?</label>
          <button id="refresh-btn" class="btn-refresh" onclick="refreshData()" title="Refresh staff &amp; client list" aria-label="Refresh">↻</button>
        </div>
        <select id="staff-select" onchange="onStaffSelected()" disabled>
          <option value="">Loading…</option>
        </select>
        <div id="staff-load-error" class="load-error" hidden></div>
      </div>

      <div id="staff-content" hidden>
        <div id="limit-alerts"></div>

        <div class="card">
          <div class="card-header">Clients</div>
          <div id="client-list"><div class="spinner">Loading…</div></div>
        </div>

        <div class="card" style="margin-top:16px">
          <div class="card-header">My entries this month</div>
          <div id="recent-logs"><div class="spinner">Loading…</div></div>
        </div>
      </div>

      <div id="staff-placeholder" style="text-align:center;padding:48px 16px;color:var(--muted)">
        <p style="font-size:2rem">👆</p>
        <p>Select your name above to get started.</p>
      </div>
    </div>

    <!-- ══════════════ OWNER VIEW ══════════════ -->
    <div id="owner-view" hidden>
      <!-- PIN Gate -->
      <div id="pin-gate">
        <h2>Owner Access</h2>
        <p>Enter your PIN to continue.</p>
        <input id="pin-input" type="password" inputmode="numeric" maxlength="8" placeholder="••••"
               onkeydown="if(event.key==='Enter') checkPin()">
        <div id="pin-error"></div>
        <button class="btn btn-primary" onclick="checkPin()">Unlock</button>
      </div>

      <!-- Owner Dashboard (shown after PIN) -->
      <div id="owner-dashboard" hidden>
        <div class="tab-bar">
          <button class="tab-btn active" onclick="showOwnerTab('dashboard')">Dashboard</button>
          <button class="tab-btn"        onclick="showOwnerTab('clients')">Clients</button>
          <button class="tab-btn"        onclick="showOwnerTab('staff')">Staff</button>
          <button class="tab-btn"        onclick="showOwnerTab('logs')">Logs</button>
        </div>

        <!-- Dashboard Tab -->
        <div id="tab-dashboard">
          <div class="card">
            <div class="card-header" id="dashboard-month-label">This month</div>
            <div id="dashboard-list"><div class="spinner">Loading…</div></div>
          </div>
        </div>

        <!-- Clients Tab -->
        <div id="tab-clients" hidden>
          <div class="card">
            <div class="card-header">Active Clients</div>
            <div id="clients-list"><div class="spinner">Loading…</div></div>
            <div class="add-row">
              <input id="new-client-name" placeholder="Client name" type="text">
              <select id="new-client-tier">
                <option value="">Tier (optional)</option>
                <option value="Bronze">Bronze</option>
                <option value="Silver">Silver</option>
                <option value="Gold">Gold</option>
              </select>
              <input id="new-client-hours" placeholder="Monthly hrs" type="number" min="0" step="1" style="max-width:130px">
              <button class="btn btn-primary btn-sm" onclick="addClient()">+ Add</button>
            </div>
          </div>
        </div>

        <!-- Staff Tab -->
        <div id="tab-staff" hidden>
          <div class="card">
            <div class="card-header">Active Staff</div>
            <div id="staff-list-owner"><div class="spinner">Loading…</div></div>
            <div class="add-row">
              <input id="new-staff-name" placeholder="Staff name" type="text">
              <button class="btn btn-primary btn-sm" onclick="addStaff()">+ Add</button>
            </div>
          </div>
        </div>

        <!-- Logs Tab -->
        <div id="tab-logs" hidden>
          <div class="filter-bar">
            <select id="log-filter-staff"  onchange="loadOwnerLogs()"><option value="">All Staff</option></select>
            <select id="log-filter-client" onchange="loadOwnerLogs()"><option value="">All Clients</option></select>
            <input id="log-filter-task" type="text" placeholder="Search task…" oninput="loadOwnerLogs()" style="flex:1;min-width:120px">
          </div>
          <div class="card">
            <div class="log-table-wrap">
              <table>
                <thead>
                  <tr>
                    <th>Staff</th>
                    <th>Client</th>
                    <th>Task</th>
                    <th>Date</th>
                    <th>Duration</th>
                    <th>Notes</th>
                    <th></th>
                  </tr>
                </thead>
                <tbody id="logs-tbody"><tr><td colspan="6" class="spinner">Loading…</td></tr></tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>
</div>

<div id="toast-container" aria-live="polite"></div>

<div class="modal-bg" id="modal-confirm">

    <h2 id="confirm-title">Are you sure?</h2>
    <p id="confirm-body" style="color:var(--muted);margin-bottom:0"></p>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('modal-confirm')">Cancel</button>
      <button class="btn btn-danger" id="confirm-ok">Confirm</button>
    </div>

<script>
// ================================================================
// CONFIG — paste your deployed Apps Script URL here
// ================================================================
const GAS_URL = 'https://script.google.com/macros/s/AKfycbycLumreGwpkxfZo480e4cmOZhHTOmvuamBsN9ivrYGN0oUd5mW9PUttsS983wf6rhiJQ/exec';

// ================================================================
// State
// ================================================================
const state = {
  clients:      [],
  staff:        [],
  monthlyTotals: {},
  currentStaff: null,
  ownerAuthed:  false,
  ownerTab:     'dashboard',
  activeTimers: {},   // clientID -> { logID, startTime (ISO) }
  intervals:    {},   // clientID -> intervalID
};

// ================================================================
// API — 10 s timeout on every call
// ================================================================
async function api(action, data = {}) {
  const timeout = new Promise((_, reject) =>
    setTimeout(() => reject(new Error('Connection slow — please try again')), 10000)
  );
  const request = fetch(GAS_URL, {
    method: 'POST',
    body: JSON.stringify({ action, ...data }),
    redirect: 'follow',
  }).then(res => {
    if (!res.ok) throw new Error('Network error ' + res.status);
    return res.json();
  });
  return Promise.race([request, timeout]);
}

// ================================================================
// Toast
// ================================================================
function showToast(msg, isError = true) {
  const container = document.getElementById('toast-container');
  const el = document.createElement('div');
  el.className = 'toast ' + (isError ? 'toast-error' : 'toast-info');
  el.textContent = msg;
  container.appendChild(el);
  setTimeout(() => el.remove(), 4000);
}

// ================================================================
// Persistence — active timers survive page refresh via localStorage
// ================================================================
function saveTimers() {
  localStorage.setItem('activeTimers', JSON.stringify(state.activeTimers));
}
function loadTimers() {
  try { state.activeTimers = JSON.parse(localStorage.getItem('activeTimers') || '{}'); }
  catch { state.activeTimers = {}; }
}

// ================================================================
// View switching
// ================================================================
function switchView(view) {
  document.getElementById('staff-view').hidden = view !== 'staff';
  document.getElementById('owner-view').hidden = view !== 'owner';
  document.getElementById('btn-staff-view').classList.toggle('active', view === 'staff');
  document.getElementById('btn-owner-view').classList.toggle('active', view === 'owner');

  if (view === 'owner' && !state.ownerAuthed) {
    document.getElementById('pin-gate').hidden = false;
    document.getElementById('owner-dashboard').hidden = true;
  }
  if (view === 'owner' && state.ownerAuthed) {
    refreshOwnerTab();
  }
}

// ================================================================
// Startup — fetch staff & clients once; show loading / error states
// ================================================================
async function init() {
  loadTimers();

  const sel      = document.getElementById('staff-select');
  const errEl    = document.getElementById('staff-load-error');
  const refreshBtn = document.getElementById('refresh-btn');

  sel.disabled = true;
  sel.innerHTML = '<option>Loading…</option>';
  errEl.hidden  = true;
  refreshBtn.classList.add('spinning');

  try {
    const [cr, sr] = await Promise.all([api('getClients'), api('getStaff')]);
    state.clients = cr.clients || [];
    state.staff   = sr.staff   || [];
    populateStaffDropdown();
  } catch (err) {
    console.error(err);
    sel.innerHTML = '<option value="">— Could not load —</option>';
    errEl.hidden  = false;
    errEl.innerHTML = `${err.message}. <button class="btn btn-outline btn-sm" style="margin-left:8px" onclick="init()">Retry</button>`;
  } finally {
    refreshBtn.classList.remove('spinning');
  }
}

// Populate (or repopulate) the staff dropdown from cached state.staff
function populateStaffDropdown() {
  const sel = document.getElementById('staff-select');
  const prev = sel.value; // preserve selection across refreshes
  sel.disabled = false;
  sel.innerHTML = '<option value="">— Select your name —</option>';
  state.staff.forEach(s => {
    const o = document.createElement('option');
    o.value = s.staffID;
    o.textContent = s.staffName;
    sel.appendChild(o);
  });
  if (prev && state.staff.find(s => s.staffID === prev)) sel.value = prev;
  document.getElementById('staff-load-error').hidden = true;
}

// Manual refresh — re-fetch staff & clients without resetting the staff selection
async function refreshData() {
  const btn = document.getElementById('refresh-btn');
  if (btn.classList.contains('spinning')) return;
  btn.classList.add('spinning');
  try {
    const [cr, sr] = await Promise.all([api('getClients'), api('getStaff')]);
    state.clients = cr.clients || [];
    state.staff   = sr.staff   || [];
    populateStaffDropdown();
    // If a staff member was already selected, refresh their client list too
    if (state.currentStaff) renderClientList();
    showToast('List updated', false);
  } catch (err) {
    showToast(err.message);
  } finally {
    btn.classList.remove('spinning');
  }
}

// ================================================================
// Staff View
// ================================================================
async function onStaffSelected() {
  const sel = document.getElementById('staff-select');
  const sid = sel.value;
  state.currentStaff = state.staff.find(s => s.staffID === sid) || null;

  document.getElementById('staff-content').hidden    = !state.currentStaff;
  document.getElementById('staff-placeholder').hidden = !!state.currentStaff;

  if (!state.currentStaff) return;

  const tr = await api('getMonthlyTotals');
  state.monthlyTotals = tr.totals || {};

  renderClientList();
  loadRecentLogs();
}

function renderClientList() {
  const el = document.getElementById('client-list');
  const alerts = document.getElementById('limit-alerts');
  alerts.innerHTML = '';

  if (!state.clients.length) {
    el.innerHTML = '<div class="empty">No clients yet.</div>';
    return;
  }

  const rows = state.clients.map(c => {
    const used  = state.monthlyTotals[c.clientID] || 0;
    const alloc = c.monthlyHours || 0;
    const pct   = alloc > 0 ? (used / alloc) * 100 : 0;
    const atLimit = alloc > 0 && used >= alloc;

    if (atLimit) {
      alerts.insertAdjacentHTML('beforeend', `
        <div class="alert alert-red">
          ⛔ <strong>${esc(c.clientName)}</strong> has reached its monthly limit (${alloc} hrs).
          Further time logged will not be billed.
        </div>`);
    }

    const timer = state.activeTimers[c.clientID];
    const isRunning = !!timer && timer.staffID === state.currentStaff.staffID;
    const timerID = 'timer-' + c.clientID;

    let badgeHTML = '';
    if (alloc > 0) {
      if (pct >= 100) badgeHTML = `<span class="limit-badge badge-red">⛔ Limit reached (${used.toFixed(1)}/${alloc} hrs)</span>`;
      else if (pct >= 80) badgeHTML = `<span class="limit-badge badge-amber">⚠️ ${pct.toFixed(0)}% used (${used.toFixed(1)}/${alloc} hrs)</span>`;
    }

    const isPending  = isRunning && !!timer.pending;   // startTimer in flight
    const isStopping = isRunning && !!timer.stopping;  // stopTimer in flight

    const taskArea = isRunning
      ? `<div class="client-task-running">📋 ${esc(timer.task || '')}</div>`
      : `<label class="task-label" for="task-${c.clientID}">Task</label>
         <input class="task-input" id="task-${c.clientID}" type="text"
                placeholder="What are you working on?"
                oninput="onTaskInput('${c.clientID}')" autocomplete="off">`;

    let btnText, btnCls, btnDisabled, btnClick;
    if (isStopping)       { btnText = 'Stopping…'; btnCls = 'btn-outline'; btnDisabled = 'disabled'; btnClick = ''; }
    else if (isPending)   { btnText = 'Starting…'; btnCls = 'btn-outline'; btnDisabled = 'disabled'; btnClick = ''; }
    else if (isRunning)   { btnText = '■ Stop';    btnCls = 'btn-danger';  btnDisabled = '';         btnClick = `stopTimer('${c.clientID}')`; }
    else                  { btnText = '▶ Start';   btnCls = 'btn-success'; btnDisabled = 'disabled'; btnClick = `startTimer('${c.clientID}')`; }

    return `
      <div class="client-card" id="card-${c.clientID}">
        <div class="client-info">
          <div class="client-name">${esc(c.clientName)}${tierBadge(c.tier)}</div>
          <div class="client-meta">${alloc > 0 ? used.toFixed(1) + ' / ' + alloc + ' hrs used' : 'No allocation set'}</div>
          ${badgeHTML}
          ${taskArea}
        </div>
        <div class="timer-display" id="${timerID}">${isRunning ? elapsed(timer.startTime) : ''}</div>
        <button class="btn btn-sm timer-btn ${btnCls}" id="tbtn-${c.clientID}"
                ${btnDisabled} ${btnClick ? `onclick="${btnClick}"` : ''}>
          ${btnText}
        </button>
      </div>`;
  }).join('');

  el.innerHTML = rows;

  // Restart intervals for any running timers
  state.clients.forEach(c => {
    const timer = state.activeTimers[c.clientID];
    if (timer && timer.staffID === state.currentStaff?.staffID) {
      startInterval(c.clientID, timer.startTime);
    }
  });
}

function onTaskInput(clientID) {
  const val = (document.getElementById('task-' + clientID)?.value || '').trim();
  const btn = document.getElementById('tbtn-' + clientID);
  if (btn) btn.disabled = !val;
}

async function startTimer(clientID) {
  const client = state.clients.find(c => c.clientID === clientID);
  const staff  = state.currentStaff;
  if (!client || !staff) return;

  const task = (document.getElementById('task-' + clientID)?.value || '').trim();
  if (!task) return;

  // Optimistic UI: add pending timer immediately
  const optimisticStart = new Date().toISOString();
  state.activeTimers[clientID] = {
    logID: '__pending__', startTime: optimisticStart,
    staffID: staff.staffID, task, pending: true,
  };
  renderClientList();

  try {
    const res = await api('startTimer', {
      staffID: staff.staffID, staffName: staff.staffName,
      clientID: client.clientID, clientName: client.clientName,
      task,
    });
    if (!res.success) throw new Error(res.error || 'Start failed');
    // Confirm with real logID / startTime from server
    state.activeTimers[clientID] = { logID: res.logID, startTime: res.startTime, staffID: staff.staffID, task };
    saveTimers();
    renderClientList();
  } catch (err) {
    // Rollback
    delete state.activeTimers[clientID];
    saveTimers();
    renderClientList();
    showToast('Could not start timer — ' + err.message);
  }
}

async function stopTimer(clientID) {
  const timer = state.activeTimers[clientID];
  if (!timer || timer.pending) return;

  // Optimistic UI: mark as stopping immediately
  const savedTimer = { ...timer };
  state.activeTimers[clientID] = { ...timer, stopping: true };
  renderClientList();

  try {
    const res = await api('stopTimer', { logID: timer.logID });
    if (!res.success) throw new Error(res.error || 'Stop failed');

    clearInterval(state.intervals[clientID]);
    delete state.intervals[clientID];
    delete state.activeTimers[clientID];
    saveTimers();

    const tr = await api('getMonthlyTotals');
    state.monthlyTotals = tr.totals || {};
    renderClientList();
    loadRecentLogs();
  } catch (err) {
    // Rollback
    state.activeTimers[clientID] = savedTimer;
    renderClientList();
    showToast('Could not stop timer — ' + err.message);
  }
}

function startInterval(clientID, startISO) {
  clearInterval(state.intervals[clientID]);
  state.intervals[clientID] = setInterval(() => {
    const el = document.getElementById('timer-' + clientID);
    if (el) el.textContent = elapsed(startISO);
  }, 1000);
}

async function loadRecentLogs() {
  const el = document.getElementById('recent-logs');
  el.innerHTML = '<div class="spinner">Loading…</div>';
  const res = await api('getLogsByStaff', { staffID: state.currentStaff.staffID });
  const logs = (res.logs || []).sort((a, b) => new Date(b.startTime) - new Date(a.startTime));

  if (!logs.length) { el.innerHTML = '<div class="empty">No entries this month.</div>'; return; }

  el.innerHTML = logs.map(log => {
    const open = !log.endTime;
    const dur  = open ? '<span class="log-open">In progress</span>'
                      : `<strong>${log.durationHours.toFixed(2)} hrs</strong>`;
    const dateStr = log.startTime ? fmtDate(log.startTime) : '—';
    return `
      <div class="log-row">
        <div class="log-info">
          <div class="log-client">${esc(log.clientName)}</div>
          ${log.task ? `<div class="log-task">${esc(log.task)}</div>` : ''}
          <div class="log-time">${dateStr}${log.notes ? ' · ' + esc(log.notes) : ''}</div>
          <div class="log-actions">
            <button class="btn btn-outline btn-sm" onclick="openEditLog('${log.logID}','${esc(log.startTime)}','${esc(log.endTime||'')}','${esc(log.task||'')}','${esc(log.notes||'')}')">Edit</button>
            <button class="btn btn-outline btn-sm" style="color:var(--red)" onclick="confirmDeleteLog('${log.logID}')">Delete</button>
          </div>
        </div>
        <div class="log-hours">${dur}</div>
      </div>`;
  }).join('');
}

// ================================================================
// Owner View — PIN
// ================================================================
async function checkPin() {
  const pin = document.getElementById('pin-input').value.trim();
  const err = document.getElementById('pin-error');
  err.textContent = '';
  if (!pin) return;

  const res = await api('verifyPin', { pin });
  if (res.success) {
    state.ownerAuthed = true;
    document.getElementById('pin-gate').hidden = true;
    document.getElementById('owner-dashboard').hidden = false;
    populateOwnerFilters();
    showOwnerTab('dashboard');
  } else {
    err.textContent = 'Incorrect PIN. Try again.';
    document.getElementById('pin-input').value = '';
  }
}

// ================================================================
// Owner View — Tabs
// ================================================================
function showOwnerTab(tab) {
  state.ownerTab = tab;
  ['dashboard','clients','staff','logs'].forEach(t => {
    document.getElementById('tab-' + t).hidden = t !== tab;
    document.querySelectorAll('.tab-btn')[['dashboard','clients','staff','logs'].indexOf(t)]
      .classList.toggle('active', t === tab);
  });
  refreshOwnerTab();
}

async function refreshOwnerTab() {
  switch (state.ownerTab) {
    case 'dashboard': loadDashboard();   break;
    case 'clients':   loadOwnerClients(); break;
    case 'staff':     loadOwnerStaff();   break;
    case 'logs':      loadOwnerLogs();    break;
  }
}

// ── Dashboard ──
async function loadDashboard() {
  const el = document.getElementById('dashboard-list');
  el.innerHTML = '<div class="spinner">Loading…</div>';

  const tr = await api('getMonthlyTotals');
  const clients = state.clients;
  const totals  = tr.totals  || {};

  const now = new Date();
  document.getElementById('dashboard-month-label').textContent =
    now.toLocaleString('default', { month: 'long', year: 'numeric' });

  if (!clients.length) { el.innerHTML = '<div class="empty">No clients.</div>'; return; }

  el.innerHTML = clients.map(c => {
    const used  = totals[c.clientID] || 0;
    const alloc = c.monthlyHours || 0;
    const pct   = alloc > 0 ? Math.min((used / alloc) * 100, 100) : 0;
    const cls   = pct >= 100 ? 'fill-red' : pct >= 80 ? 'fill-amber' : 'fill-green';
    const rem   = alloc > 0 ? Math.max(alloc - used, 0).toFixed(1) : '—';
    return `
      <div class="client-progress">
        <div class="progress-header">
          <span class="progress-name">${esc(c.clientName)}${tierBadge(c.tier)}</span>
          <span class="progress-label">${used.toFixed(1)} / ${alloc} hrs</span>
        </div>
        <div class="progress-bar"><div class="progress-fill ${cls}" style="width:${pct.toFixed(1)}%"></div></div>
        <div class="progress-footer">
          <span>${pct.toFixed(0)}% used</span>
          <span>${rem !== '—' ? rem + ' hrs remaining' : 'No allocation'}</span>
        </div>
      </div>`;
  }).join('');
}

// ── Clients ──
async function loadOwnerClients() {
  const el = document.getElementById('clients-list');
  el.innerHTML = '<div class="spinner">Loading…</div>';
  const res = await api('getClients');
  state.clients = res.clients || [];

  if (!state.clients.length) { el.innerHTML = '<div class="empty">No clients yet.</div>'; return; }

  el.innerHTML = state.clients.map(c => `
    <div class="owner-list-item">
      <div class="item-info">
        <div class="item-name">${esc(c.clientName)} ${tierBadge(c.tier)}</div>
        <div class="item-meta">${c.monthlyHours} hrs / month</div>
      </div>
      <div class="item-actions">
        <button class="btn btn-outline btn-sm"
          onclick="openEditClient('${c.clientID}','${esc(c.clientName)}','${esc(c.tier)}',${c.monthlyHours})">Edit</button>
        <button class="btn btn-outline btn-sm" style="color:var(--red)"
          onclick="confirmDeactivate('client','${c.clientID}','${esc(c.clientName)}')">Remove</button>
      </div>
    </div>`).join('');
}

async function addClient() {
  const name  = document.getElementById('new-client-name').value.trim();
  const tier  = document.getElementById('new-client-tier').value;
  const hours = Number(document.getElementById('new-client-hours').value);
  if (!name) { alert('Enter a client name.'); return; }
  const res = await api('addClient', { clientName: name, tier, monthlyHours: hours });
  if (res.success) {
    document.getElementById('new-client-name').value  = '';
    document.getElementById('new-client-hours').value = '';
    document.getElementById('new-client-tier').value  = '';
    loadOwnerClients();
  } else { alert('Error: ' + res.error); }
}

function openEditClient(id, name, tier, hours) {
  document.getElementById('edit-client-id').value    = id;
  document.getElementById('edit-client-name').value  = name;
  document.getElementById('edit-client-tier').value  = tier;
  document.getElementById('edit-client-hours').value = hours;
  openModal('modal-edit-client');
}

async function saveEditClient() {
  const id    = document.getElementById('edit-client-id').value;
  const name  = document.getElementById('edit-client-name').value.trim();
  const tier  = document.getElementById('edit-client-tier').value;
  const hours = Number(document.getElementById('edit-client-hours').value);
  if (!name) { alert('Name required.'); return; }
  const res = await api('editClient', { clientID: id, clientName: name, tier, monthlyHours: hours });
  if (res.success) { closeModal('modal-edit-client'); loadOwnerClients(); }
  else { alert('Error: ' + res.error); }
}

// ── Staff ──
async function loadOwnerStaff() {
  const el = document.getElementById('staff-list-owner');
  el.innerHTML = '<div class="spinner">Loading…</div>';
  const res = await api('getStaff');
  state.staff = res.staff || [];

  if (!state.staff.length) { el.innerHTML = '<div class="empty">No staff yet.</div>'; return; }

  el.innerHTML = state.staff.map(s => `
    <div class="owner-list-item">
      <div class="item-info">
        <div class="item-name">${esc(s.staffName)}</div>
      </div>
      <div class="item-actions">
        <button class="btn btn-outline btn-sm" style="color:var(--red)"
          onclick="confirmDeactivate('staff','${s.staffID}','${esc(s.staffName)}')">Remove</button>
      </div>
    </div>`).join('');
}

async function addStaff() {
  const name = document.getElementById('new-staff-name').value.trim();
  if (!name) { alert('Enter a staff name.'); return; }
  const res = await api('addStaff', { staffName: name });
  if (res.success) { document.getElementById('new-staff-name').value = ''; loadOwnerStaff(); }
  else { alert('Error: ' + res.error); }
}

// ── Logs ──
function populateOwnerFilters() {
  const sf = document.getElementById('log-filter-staff');
  const cf = document.getElementById('log-filter-client');
  state.staff.forEach(s => {
    const o = document.createElement('option'); o.value = s.staffID; o.textContent = s.staffName; sf.appendChild(o);
  });
  state.clients.forEach(c => {
    const o = document.createElement('option'); o.value = c.clientID; o.textContent = c.clientName; cf.appendChild(o);
  });
}

async function loadOwnerLogs() {
  const tb         = document.getElementById('logs-tbody');
  const sid        = document.getElementById('log-filter-staff').value;
  const cid        = document.getElementById('log-filter-client').value;
  const taskFilter = (document.getElementById('log-filter-task')?.value || '').trim().toLowerCase();
  tb.innerHTML = '<tr><td colspan="7" class="spinner">Loading…</td></tr>';

  const res = await api('getAllLogs', { staffID: sid || undefined, clientID: cid || undefined });
  let logs = (res.logs || []).sort((a,b) => new Date(b.startTime) - new Date(a.startTime));

  if (taskFilter) {
    logs = logs.filter(l => (l.task || '').toLowerCase().includes(taskFilter));
  }

  if (!logs.length) { tb.innerHTML = '<tr><td colspan="7" class="empty">No entries found.</td></tr>'; return; }

  tb.innerHTML = logs.map(log => {
    const dur = log.endTime
      ? (typeof log.durationHours === 'number' ? log.durationHours.toFixed(2) + ' hrs' : '—')
      : '<span class="log-open">In progress</span>';
    return `
      <tr>
        <td>${esc(log.staffName)}</td>
        <td>${esc(log.clientName)}</td>
        <td>${esc(log.task || '')}</td>
        <td>${log.startTime ? fmtDate(log.startTime) : '—'}</td>
        <td>${dur}</td>
        <td>${esc(log.notes || '')}</td>
        <td class="td-actions">
          <button class="btn btn-outline btn-sm"
            onclick="openEditLog('${log.logID}','${esc(log.startTime)}','${esc(log.endTime||'')}','${esc(log.task||'')}','${esc(log.notes||'')}')">Edit</button>
          <button class="btn btn-outline btn-sm" style="color:var(--red)"
            onclick="confirmDeleteLog('${log.logID}')">Del</button>
        </td>
      </tr>`;
  }).join('');
}

// ================================================================
// Edit Log Modal
// ================================================================
function openEditLog(logID, startISO, endISO, task, notes) {
  document.getElementById('edit-log-id').value      = logID;
  document.getElementById('edit-start-time').value  = isoToLocal(startISO);
  document.getElementById('edit-end-time').value    = endISO ? isoToLocal(endISO) : '';
  document.getElementById('edit-task').value         = task || '';
  document.getElementById('edit-notes').value        = notes || '';
  openModal('modal-edit-log');
}

async function saveEditLog() {
  const logID = document.getElementById('edit-log-id').value;
  const start = localToISO(document.getElementById('edit-start-time').value);
  const end   = localToISO(document.getElementById('edit-end-time').value);
  const task  = document.getElementById('edit-task').value.trim();
  const notes = document.getElementById('edit-notes').value.trim();
  if (!start || !end) { alert('Both start and end times are required.'); return; }
  if (new Date(end) <= new Date(start)) { alert('End time must be after start time.'); return; }
  const res = await api('editLog', { logID, startTime: start, endTime: end, task, notes });
  if (res.success) {
    closeModal('modal-edit-log');
    if (state.ownerAuthed && state.ownerTab === 'logs') loadOwnerLogs();
    else if (state.currentStaff) loadRecentLogs();
  } else { alert('Error: ' + res.error); }
}

// ================================================================
// Confirm / Delete
// ================================================================
function confirmDeleteLog(logID) {
  confirm2('Delete entry?', 'This cannot be undone.', async () => {
    const res = await api('deleteLog', { logID });
    if (res.success) {
      if (state.ownerAuthed && state.ownerTab === 'logs') loadOwnerLogs();
      else if (state.currentStaff) loadRecentLogs();
    } else { alert('Error: ' + res.error); }
  });
}

function confirmDeactivate(type, id, name) {
  confirm2(`Remove ${name}?`, `This will deactivate them. Existing log entries are kept.`, async () => {
    const action = type === 'client' ? 'deactivateClient' : 'deactivateStaff';
    const idKey  = type === 'client' ? 'clientID' : 'staffID';
    const res = await api(action, { [idKey]: id });
    if (res.success) {
      if (type === 'client') loadOwnerClients();
      else loadOwnerStaff();
    } else { alert('Error: ' + res.error); }
  });
}

function confirm2(title, body, onOk) {
  document.getElementById('confirm-title').textContent = title;
  document.getElementById('confirm-body').textContent  = body;
  const btn = document.getElementById('confirm-ok');
  btn.onclick = () => { closeModal('modal-confirm'); onOk(); };
  openModal('modal-confirm');
}

// ================================================================
// Modal helpers
// ================================================================
function openModal(id)  { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

// Close modal on backdrop click
document.querySelectorAll('.modal-bg').forEach(bg => {
  bg.addEventListener('click', e => { if (e.target === bg) closeModal(bg.id); });
});

// ================================================================
// Utilities
// ================================================================
function esc(str) {
  return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function elapsed(startISO) {
  const s = Math.floor((Date.now() - new Date(startISO).getTime()) / 1000);
  const h = Math.floor(s / 3600);
  const m = Math.floor((s % 3600) / 60);
  const sec = s % 60;
  return `${h}:${pad(m)}:${pad(sec)}`;
}
function pad(n) { return String(n).padStart(2, '0'); }

function fmtDate(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  return d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short' }) + ' ' +
         d.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
}

function isoToLocal(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  const pad = n => String(n).padStart(2,'0');
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
}

function localToISO(local) {
  if (!local) return '';
  return new Date(local).toISOString();
}

function tierBadge(tier) {
  if (!tier) return '';
  const cls = { Bronze: 'tier-bronze', Silver: 'tier-silver', Gold: 'tier-gold' }[tier] || '';
  return ` <span class="tier ${cls}">${tier}</span>`;
}

// ================================================================
// Boot
// ================================================================
init().catch(err => {
  console.error(err);
  document.querySelector('main').insertAdjacentHTML('afterbegin',
    `<div class="alert alert-red">⚠️ Could not connect to backend. Check GAS_URL in this file.<br><small>${err.message}</small></div>`);
});
</script>
